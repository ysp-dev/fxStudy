<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f5efe0">
  <title>FX 1종 — 모바일 학습앱</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- App styles -->
  <link rel="stylesheet" href="src/style.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    #root { width: 100%; height: 100vh; height: 100dvh; }

    /* 데스크톱: 430px 폰 크기로 중앙 정렬 */
    @media (min-width: 431px) {
      body {
        display: flex;
        justify-content: center;
        background: #ddd5be;
      }
      #root {
        width: 430px;
        height: 100vh;
        height: 100dvh;
        max-height: 932px;
        box-shadow: 0 0 60px rgba(0,0,0,0.18);
        overflow: hidden;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 production (CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- App data -->
  <script src="src/data.js"></script>

  <!-- App components (pre-compiled) -->
  <script src="src/app.js"></script>

  <!-- Mount -->
  <script>
    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(MobileApp)
    );
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
